AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  System for Automated Data Normalization and Verification.

Resources:
  RawDataBucket:
    Type: AWS::S3::Bucket

  DataProcessingFunction:
    Type: AWS::Serverless::Function 
    Properties:
      Handler: lambda_function.lambda_handler
      Runtime: python3.9
      CodeUri: ./src
      MemorySize: 128
      Timeout: 30
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref RawDataBucket
        - Statement:
            - Effect: Allow
              Action: 'bedrock:InvokeModel'
              Resource: '*'